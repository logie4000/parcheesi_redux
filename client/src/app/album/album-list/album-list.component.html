 <table>
   <thead>
     <tr>
       <th>Title</th>
       <th>Artist</th>
     </tr>
   </thead>

   <tbody>
     @for (album of itemList(); track album) {
       <tr (click)="onRowClick(album)">
         <td>{{ album.title }}</td>
         <td>{{ albumArtist(album) }}</td>
       </tr>
      }
   </tbody>
 </table>
