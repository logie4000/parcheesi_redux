 <table>
   <thead>
     <tr>
       <th>Publish Date</th>
       <th>Title</th>
       <th>URL</th>
       <th>Dee Jay</th>
     </tr>
   </thead>

   <tbody>
     @for (radio_show of itemList(); track radio_show) {
       <tr (click)="onRowClick(radio_show)">
         <td>{{ radio_show.publish_date }}</td>
         <td>{{ radio_show.title }}</td>
         <td>{{ radio_show.web_link }}</td>
         <td>{{ deeJayName(radio_show) }}</td>
       </tr>
      }
   </tbody>
 </table>
