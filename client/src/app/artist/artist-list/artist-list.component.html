 <table>
   <thead>
     <tr>
       <th>Name</th>
       <th>Albums</th>
       <th>Songs</th>
     </tr>
   </thead>

   <tbody>
     @for (artist of itemList(); track artist) {
       <tr (click)="onRowClick(artist)">
         <td>{{ artist.name }}</td>
         <td>{{ artist.albums?.length }}</td>
         <td>{{ artist.songs?.length }}</td>
       </tr>
      }
   </tbody>
 </table>
